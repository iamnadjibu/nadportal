<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Films | IAM NAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-zinc-300 antialiased overflow-x-hidden">
    <nav id="navbar" class="fixed w-full z-[100] py-8 bg-black/80 backdrop-blur-md border-b border-zinc-900">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white font-outfit">IAM <span class="text-amber-500">NAD</span></a>
            <div class="hidden lg:flex items-center space-x-8 text-[10px] uppercase tracking-[0.3em] font-black">
                <a href="index.html" class="text-zinc-500 hover:text-white">Home</a>
                <a href="films.html" class="text-white border-b border-amber-500">Films</a>
                <a href="graphics.html" class="text-zinc-500 hover:text-white">Graphics</a>
                <a href="websites.html" class="text-zinc-500 hover:text-white">Websites</a>
                <a href="about.html" class="text-zinc-500 hover:text-white">About NAD</a>
                <a href="contact.html" class="text-zinc-500 hover:text-white">Contact Us</a>
            </div>
            <button class="lg:hidden text-white"><i data-lucide="menu"></i></button>
        </div>
    </nav>

    <div class="pt-48 pb-20 px-8 max-w-7xl mx-auto">
        <h1 class="text-8xl font-black text-white uppercase tracking-tighter mb-12 font-outfit">FILMS</h1>
        <div id="films-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <!-- Loading -->
            <p class="text-zinc-800 uppercase font-black tracking-widest text-xs">Syncing Reels...</p>
        </div>
    </div>

    <script type="module">
        import { db, collection } from '../shared/firebase-config.js';
        import { onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        
        lucide.createIcons();

        const q = query(collection(db, 'nad_projects'), where('type', 'in', ['FILM', 'AI FILM', 'SHORT FILM']));
        onSnapshot(q, (snap) => {
            const grid = document.getElementById('films-grid');
            grid.innerHTML = snap.docs.map(doc => {
                const p = doc.data();
                return `
                    <div class="group cursor-pointer">
                        <div class="aspect-video bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-900">
                            <img src="${p.thumbnail}" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all duration-700">
                        </div>
                        <div class="p-8">
                            <p class="text-amber-500 text-[10px] font-black uppercase mb-1 tracking-widest">${p.type}</p>
                            <h3 class="text-3xl font-black text-white uppercase tracking-tighter">${p.title}</h3>
                        </div>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
