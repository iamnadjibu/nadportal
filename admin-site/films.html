<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Films | NAD STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public-site/style.css">
</head>
<body class="bg-[#020202] text-zinc-500 overflow-x-hidden">

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-80 h-screen fixed bg-black border-r border-zinc-900 p-8 flex flex-col">
            <h2 class="text-2xl font-black text-white font-outfit uppercase mb-12">NAD <span class="text-amber-500">STUDIO</span></h2>
            <nav class="flex-1 space-y-2">
                <a href="dashboard.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl text-zinc-600 hover:bg-zinc-900 text-xs font-black uppercase tracking-widest transition-all">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span>Dashboard</span>
                </a>
                <a href="films.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl bg-amber-500/10 text-amber-500 text-xs font-black uppercase tracking-widest">
                    <i data-lucide="film" class="w-4 h-4"></i> <span>Films</span>
                </a>
                <a href="websites.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl text-zinc-600 hover:bg-zinc-900 text-xs font-black uppercase tracking-widest transition-all">
                    <i data-lucide="globe" class="w-4 h-4"></i> <span>Websites</span>
                </a>
                <a href="graphics.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl text-zinc-600 hover:bg-zinc-900 text-xs font-black uppercase tracking-widest transition-all">
                    <i data-lucide="pen-tool" class="w-4 h-4"></i> <span>Graphics</span>
                </a>
            </nav>
            <button id="logout" class="mt-auto flex items-center space-x-3 px-6 py-4 text-xs font-black uppercase tracking-widest text-zinc-700 hover:text-red-500 transition-all">
                <i data-lucide="log-out" class="w-4 h-4"></i> <span>Logout</span>
            </button>
        </aside>

        <!-- Content -->
        <main class="flex-1 ml-80 p-16">
            <div class="flex justify-between items-end mb-16">
                <div>
                    <h1 class="text-6xl font-black text-white font-outfit uppercase tracking-tighter">FILM NODE</h1>
                    <p class="text-[10px] font-black tracking-widest text-zinc-700 uppercase">Production Management</p>
                </div>
                <button id="add-btn" class="bg-white text-black px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-amber-500 transition-all">New Production</button>
            </div>
            
            <div id="films-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Injected via JS -->
            </div>
        </main>
    </div>

    <!-- Modal Placeholder -->
    <div id="modal"></div>

    <script type="module">
        import { db, auth, collection } from '../shared/firebase-config.js';
        import { onSnapshot, query, where, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import '../shared/auth-check.js';

        lucide.createIcons();
        document.getElementById('logout').onclick = () => signOut(auth);

        const q = query(collection(db, 'nad_projects'), where('type', 'in', ['FILM', 'AI FILM', 'SHORT FILM']));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('films-list');
            list.innerHTML = snap.docs.map(snapDoc => {
                const p = snapDoc.data();
                return `
                    <div class="glass-panel p-8 rounded-[2.5rem] flex items-center justify-between group">
                        <div class="flex items-center space-x-6">
                            <div class="w-24 h-16 rounded-xl overflow-hidden bg-black">
                                <img src="${p.thumbnail}" class="w-full h-full object-cover opacity-50">
                            </div>
                            <div>
                                <h3 class="text-white font-black text-sm uppercase">${p.title}</h3>
                                <p class="text-zinc-700 text-[10px] font-bold uppercase">${p.type}</p>
                            </div>
                        </div>
                        <button onclick="window.deleteNode('${snapDoc.id}')" class="text-zinc-800 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        });

        window.deleteNode = async (id) => {
            if (confirm("Erase production node?")) await deleteDoc(doc(db, 'nad_projects', id));
        };

        document.getElementById('add-btn').onclick = () => {
            const title = prompt("Production Title:");
            if (title) addDoc(collection(db, 'nad_projects'), { title, type: 'FILM', timestamp: Date.now(), views: 0, clicks: 0, thumbnail: 'https://via.placeholder.com/800x450' });
        };
    </script>
</body>
</html>
