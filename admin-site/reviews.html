<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Reviews | NAD STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public-site/style.css">
</head>
<body class="bg-[#020202] text-zinc-500 overflow-x-hidden">

    <div class="flex">
        <div id="sidebar-target"></div>

        <main class="flex-1 ml-80 p-16">
            <h1 class="text-6xl font-black text-white font-outfit uppercase tracking-tighter mb-16">COMMUNITY REVIEWS</h1>
            
            <div id="reviews-list" class="space-y-6">
                <p class="text-zinc-800 uppercase font-black tracking-widest text-xs">Monitoring Discourse...</p>
            </div>
        </main>
    </div>

    <script type="module" src="../shared/nav-injector.js"></script>
    <script type="module">
        import { db, auth, collection } from '../shared/firebase-config.js';
        import { onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import '../shared/auth-check.js';

        const q = query(collection(db, 'nad_comments'), orderBy('timestamp', 'desc'));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('reviews-list');
            
            if (snap.empty) {
                list.innerHTML = `<p class="py-20 text-center font-bold text-zinc-900 border-2 border-dashed border-zinc-900 rounded-[3rem] uppercase tracking-widest">No transmissions recorded</p>`;
                return;
            }

            list.innerHTML = snap.docs.map(snapDoc => {
                const c = snapDoc.data();
                return `
                    <div class="glass-panel p-10 rounded-[3rem] flex justify-between items-center group transition-all hover:border-amber-500/30">
                        <div class="space-y-3">
                            <div class="flex items-center space-x-3">
                                <span class="bg-amber-500 text-black px-3 py-1 rounded-full text-[8px] font-black uppercase">Identity</span>
                                <p class="text-white text-xs font-black uppercase tracking-widest">${c.userName}</p>
                                ${c.userEmail ? `<span class="text-zinc-700 text-[10px] lowercase">${c.userEmail}</span>` : ''}
                            </div>
                            <p class="text-zinc-400 text-sm leading-relaxed max-w-3xl">"${c.text}"</p>
                            <p class="text-[8px] font-bold text-zinc-800 uppercase tracking-widest">Project ID: ${c.projectId.slice(0, 8)}... | ${new Date(c.timestamp).toLocaleString()}</p>
                        </div>
                        <button onclick="window.deleteReview('${snapDoc.id}')" class="p-4 bg-zinc-900 text-zinc-700 hover:bg-red-600 hover:text-white rounded-2xl transition-all">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            }).join('');
            if (lucide) lucide.createIcons();
        });

        window.deleteReview = async (id) => {
            if (confirm("Purge this review transmission?")) {
                await deleteDoc(doc(db, 'nad_comments', id));
            }
        };
    </script>
</body>
</html>
