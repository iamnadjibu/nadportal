<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NAD STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public-site/style.css">
</head>
<body class="bg-[#020202] text-zinc-500 overflow-x-hidden">

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-80 h-screen fixed bg-black border-r border-zinc-900 p-8 flex flex-col">
            <h2 class="text-2xl font-black text-white font-outfit uppercase mb-12">NAD <span class="text-amber-500">STUDIO</span></h2>
            <nav class="flex-1 space-y-2">
                <a href="dashboard.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl bg-amber-500/10 text-amber-500 text-xs font-black uppercase tracking-widest">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span>Dashboard</span>
                </a>
                <a href="films.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl text-zinc-600 hover:bg-zinc-900 text-xs font-black uppercase tracking-widest transition-all">
                    <i data-lucide="film" class="w-4 h-4"></i> <span>Films</span>
                </a>
                <a href="websites.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl text-zinc-600 hover:bg-zinc-900 text-xs font-black uppercase tracking-widest transition-all">
                    <i data-lucide="globe" class="w-4 h-4"></i> <span>Websites</span>
                </a>
                <a href="graphics.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl text-zinc-600 hover:bg-zinc-900 text-xs font-black uppercase tracking-widest transition-all">
                    <i data-lucide="pen-tool" class="w-4 h-4"></i> <span>Graphics</span>
                </a>
                <a href="reviews.html" class="flex items-center space-x-3 px-6 py-4 rounded-2xl text-zinc-600 hover:bg-zinc-900 text-xs font-black uppercase tracking-widest transition-all">
                    <i data-lucide="message-square" class="w-4 h-4"></i> <span>Reviews</span>
                </a>
            </nav>
            <button id="logout" class="mt-auto flex items-center space-x-3 px-6 py-4 text-xs font-black uppercase tracking-widest text-zinc-700 hover:text-red-500 transition-all">
                <i data-lucide="log-out" class="w-4 h-4"></i> <span>Logout</span>
            </button>
        </aside>

        <!-- Content -->
        <main class="flex-1 ml-80 p-16">
            <h1 class="text-6xl font-black text-white font-outfit uppercase tracking-tighter mb-12">INTELLIGENCE</h1>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="glass-panel p-10 rounded-[3rem] shadow-2xl">
                    <p class="text-white text-[10px] font-black uppercase mb-8">Video Views Analytics</p>
                    <canvas id="viewsChart"></canvas>
                </div>
                <div class="glass-panel p-10 rounded-[3rem] shadow-2xl">
                    <p class="text-white text-[10px] font-black uppercase mb-8">System Clicks (Web vs Graphics)</p>
                    <canvas id="clicksChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db, auth } from '../shared/firebase-config.js';
        import { onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import '../shared/auth-check.js';

        lucide.createIcons();

        document.getElementById('logout').onclick = () => signOut(auth);

        onSnapshot(collection(db, 'nad_projects'), (snap) => {
            const projects = snap.docs.map(d => d.data());
            initCharts(projects);
        });

        function initCharts(data) {
            const viewsCtx = document.getElementById('viewsChart').getContext('2d');
            const clicksCtx = document.getElementById('clicksChart').getContext('2d');

            new Chart(viewsCtx, {
                type: 'bar',
                data: {
                    labels: data.filter(p => ['FILM', 'AI FILM'].includes(p.type)).map(p => p.title),
                    datasets: [{ label: 'Views', data: data.filter(p => ['FILM', 'AI FILM'].includes(p.type)).map(p => p.views || 0), backgroundColor: '#f59e0b' }]
                }
            });

            new Chart(clicksCtx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar'], // Mock temporal labels
                    datasets: [
                        { label: 'Websites', data: [12, 19, 3], borderColor: '#fff' },
                        { label: 'Graphics', data: [5, 2, 9], borderColor: '#f59e0b' }
                    ]
                }
            });
        }
    </script>
</body>
</html>
